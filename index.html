<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
        }

        .container {
            width: 400px;
            height: 200px;
            background: white;
            opacity: 0.8;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Atividade</h1>
    </div>
</body>
</html>
